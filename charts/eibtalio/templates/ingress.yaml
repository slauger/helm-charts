{{- if .Values.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "eibtalio.fullname" . }}
  labels:
    {{- include "eibtalio.labels" . | nindent 4 }}
  {{- if .Values.ingress.className }}
  annotations:
    kubernetes.io/ingress.class: {{ .Values.ingress.className }}
  {{- end }}
spec:
  {{- if .Values.ingress.className }}
  ingressClassName: {{ .Values.ingress.className }}
  {{- end }}
  {{- if .Values.ingress.tls.enabled }}
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
      secretName: {{ .Values.ingress.tls.secretName | default (printf "%s-tls" (include "eibtalio.fullname" .)) }}
  {{- end }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: {{ include "eibtalio.fullname" . }}-backend
                port:
                  name: http
          - path: /auth
            pathType: Prefix
            backend:
              service:
                name: {{ include "eibtalio.fullname" . }}-backend
                port:
                  name: http
          - path: /health
            pathType: Exact
            backend:
              service:
                name: {{ include "eibtalio.fullname" . }}-backend
                port:
                  name: http
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "eibtalio.fullname" . }}-frontend
                port:
                  name: http
{{- end }}
