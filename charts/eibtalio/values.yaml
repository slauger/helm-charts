---
imagePullSecrets: []

backend:
  # Required — no defaults, must be set
  image: ""
  replicas: 1
  port: 8000
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

frontend:
  # Required — no defaults, must be set
  image: ""
  replicas: 1
  port: 80
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 200m
      memory: 128Mi

ingress:
  enabled: false
  className: ""
  frontendHost: ""
  backendHost: ""
  tls:
    enabled: false
    frontendSecretName: ""
    backendSecretName: ""

postgresql:
  instances: 1
  storage:
    size: 5Gi

# Nächtlicher Testdaten-Reset (nur für QA/Demo-Umgebungen aktivieren!)
testdataReset:
  enabled: false
  schedule: "0 2 * * *"
  timeZone: "Europe/Berlin"

env:
  debug: "false"
  corsOrigins: ""
